name: Daily Ecommerce Pipeline

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery pandas faker db-dtypes pyarrow

      - name: Set up GCP credentials
        env:
          GCP_KEY: ${{ secrets.GCP_KEY }}
        run: |
          echo '${{ secrets.GCP_KEY }}' > /tmp/gcp_key.json
          echo "Credentials written!"

      - name: Generate today orders
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_key.json
        run: python scripts/generate_today.py

      - name: Refresh BigQuery reports
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_key.json
        run: python scripts/refresh_reports.py
